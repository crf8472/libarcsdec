name: Build examples

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
          - os: ubuntu-latest
            compiler: clang++
          - os: macos-latest
            compiler: clang++
          # Windows (commented out, untested)
          # - os: windows-latest
          #   compiler: msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # libarcstk
          submodules: recursive

      - name: Update libarcstk to dev if on dev branch
        if: github.ref == 'refs/heads/dev'
        run: |
          cd libs/libarcstk
          git fetch origin dev:dev
          git checkout dev

      # WITH_EXAMPLES=ON falls down to libarcstk and requires libsndfile+libcue
      - name: Set up dependencies (ubuntu-latest)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libfl-dev
          sudo apt-get install -y libsndfile1   libsndfile1-dev
          sudo apt-get install -y libcue2       libcue-dev

      - name: Set up dependencies (macos-latest)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja libsndfile libcue

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_SUBMODULES=ON  \
            -DWITH_TESTS=OFF      \
            -DWITH_FLAC=OFF       \
            -DWITH_FFMPEG=OFF     \
            -DWITH_WAVPACK=OFF    \
            -DWITH_LIBSNDFILE=OFF \
            -DWITH_LIBCUE=OFF     \
            -DWITH_EXAMPLES=ON

      - name: Build
        run: cmake --build build

      - name: Run examples
        run: |
          ./build/examples/albumcalc/albumcalc
          ./build/examples/albumid/albumid


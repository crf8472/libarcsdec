name: Build & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
          - os: ubuntu-latest
            compiler: clang++
          - os: macos-latest
            compiler: clang++
          # Windows (commented out, untested)
          # - os: windows-latest
          #   compiler: msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          sudo apt-get install -y libflac++11 libflac-dev
          sudo apt-get install -y ffmpeg
          sudo apt-get install -y libsndfile1 libsndfile1-dev
          sudo apt-get install -y libwavpack libwavpack-dev
          sudo apt-get install -y libcue2 libcue-dev

      - name: Set up dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja flac ffmpeg libsndfile wavpack libcue

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_SUBMODULES=ON \
            -DWITH_LIBSNDFILE=ON \
            -DWITH_LIBCUE=ON \
            -DWITH_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -V


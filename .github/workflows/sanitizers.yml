name: Sanitizers

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  asan:
    name: Run Tests with ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [ g++, clang++ ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # libarcstk
          submodules: recursive

      - name: Update libarcstk to dev if on dev branch
        if: github.ref == 'refs/heads/dev'
        run: |
          cd libs/libarcstk
          git fetch origin dev:dev
          git checkout dev

      - name: Set up dependencies (ubuntu-latest == 24.04 "Noble Noumbat")
        run: |
          sudo apt-get install -y cmake ninja-build
          sudo apt-get install -y libfl-dev
          sudo apt-get install -y libflac++10   libflac++-dev
          sudo apt-get install -y libavcodec60  libavcodec-dev
          sudo apt-get install -y libavformat60 libavformat-dev
          sudo apt-get install -y libavutil58   libavutil-dev
          sudo apt-get install -y libwavpack1   libwavpack-dev
          sudo apt-get install -y libsndfile1   libsndfile1-dev
          sudo apt-get install -y libcue2       libcue-dev

      - name: Configure with AddressSanitizer
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_SUBMODULES=ON \
            -DWITH_TESTS=ON      \
            -DWITH_EXAMPLES=OFF  \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }} \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"

      - name: Build
        run: cmake --build build

      - name: Run tests with ASAN
        run: ctest --test-dir build --verbose
        env:
          ASAN_OPTIONS: "halt_on_error=1:strict_string_checks=1"

  ubsan:
    name: Run Tests with UBSAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [ g++, clang++ ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # libarcstk
          submodules: recursive

      - name: Update libarcstk to dev if on dev branch
        if: github.ref == 'refs/heads/dev'
        run: |
          cd libs/libarcstk
          git fetch origin dev:dev
          git checkout dev

      - name: Set up dependencies (ubuntu-latest == 24.04 "Noble Noumbat")
        run: |
          sudo apt-get install -y cmake ninja-build
          sudo apt-get install -y libfl-dev
          sudo apt-get install -y libflac++10   libflac++-dev
          sudo apt-get install -y libavcodec60  libavcodec-dev
          sudo apt-get install -y libavformat60 libavformat-dev
          sudo apt-get install -y libavutil58   libavutil-dev
          sudo apt-get install -y libwavpack1   libwavpack-dev
          sudo apt-get install -y libsndfile1   libsndfile1-dev
          sudo apt-get install -y libcue2       libcue-dev

      - name: Configure with UBSAN
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_SUBMODULES=ON \
            -DWITH_TESTS=ON      \
            -DWITH_EXAMPLES=OFF  \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }} \
            -DCMAKE_CXX_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer -g"

      - name: Build
        run: cmake --build build

      - name: Run tests with UBSAN
        run: ctest --test-dir build --verbose
        env:
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"

